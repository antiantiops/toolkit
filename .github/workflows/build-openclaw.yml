name: Build OpenClaw Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      apt_packages:
        description: 'Extra apt packages to install (space-separated)'
        required: false
        default: ''

env:
  IMAGE_NAME: antiantiops/openclaw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Clone OpenClaw source repository
        run: |
          git clone https://github.com/openclaw/openclaw.git openclaw-source
          cd openclaw-source
          echo "OPENCLAW_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Copy Dockerfile to OpenClaw source
        run: |
          cp openclaw/Dockerfile openclaw-source/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./openclaw-source
          file: ./openclaw-source/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=${{ github.event.inputs.apt_packages || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image details
        run: |
          echo "✅ Image built successfully!"
          echo "📦 Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "🔖 OpenClaw version: ${{ env.OPENCLAW_VERSION }}"
