name: Build OpenClaw Docker Images and APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      openclaw_tag:
        description: 'OpenClaw tag to build'
        required: true
        default: 'v2026.3.28'
      apt_packages:
        description: 'Extra apt packages to install (space-separated)'
        required: false
        default: ''

env:
  IMAGE_NAME: antiantiops/openclaw
  OPENCLAW_TAG: v2026.3.28
  DEVOPS_TAG_SUFFIX: -devops-tool

jobs:
  docker_build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Clone OpenClaw source repository
        run: |
          REQUESTED_TAG="${{ inputs.openclaw_tag || env.OPENCLAW_TAG }}"
          REPO_URL="https://github.com/openclaw/openclaw.git"

          if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_TAG" "$REPO_URL" openclaw-source
            OPENCLAW_VERSION="$REQUESTED_TAG"
          else
            if [ -n "$REQUESTED_TAG" ]; then
              echo "Requested tag '$REQUESTED_TAG' not found in openclaw/openclaw. Falling back to default branch."
            fi
            git clone --depth 1 "$REPO_URL" openclaw-source
            OPENCLAW_VERSION="$(git -C openclaw-source rev-parse --short HEAD)"
          fi

          echo "OPENCLAW_VERSION=$OPENCLAW_VERSION" >> $GITHUB_ENV

      - name: Copy Dockerfiles to OpenClaw source
        run: |
          cp openclaw/Dockerfile openclaw-source/
          cp openclaw/Dockerfile_DevOps openclaw-source/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.OPENCLAW_VERSION }}
            type=raw,value=latest

      - name: Extract metadata for Docker DevOps image
        id: meta_devops
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.OPENCLAW_VERSION }}${{ env.DEVOPS_TAG_SUFFIX }}
            type=raw,value=latest${{ env.DEVOPS_TAG_SUFFIX }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./openclaw-source
          file: ./openclaw-source/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=${{ github.event.inputs.apt_packages || '' }}
          cache-from: type=gha,scope=openclaw
          cache-to: type=gha,mode=max,scope=openclaw

      - name: Build and push Docker DevOps image
        uses: docker/build-push-action@v7
        with:
          context: ./openclaw-source
          file: ./openclaw-source/Dockerfile_DevOps
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_devops.outputs.tags }}
          labels: ${{ steps.meta_devops.outputs.labels }}
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=${{ github.event.inputs.apt_packages || '' }}
          cache-from: type=gha,scope=openclaw-devops
          cache-to: type=gha,mode=max,scope=openclaw-devops

      - name: Output image details
        run: |
          echo "✅ Image built successfully!"
          echo "📦 Base image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "📦 DevOps image tags:"
          echo "${{ steps.meta_devops.outputs.tags }}"
          echo "🔖 OpenClaw version: ${{ env.OPENCLAW_VERSION }}"

  apk_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          REQUESTED_TAG="${{ inputs.openclaw_tag || env.OPENCLAW_TAG }}"
          REPO_URL="https://github.com/openclaw/openclaw.git"

          if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_TAG" "$REPO_URL" openclaw-source
            OPENCLAW_VERSION="$REQUESTED_TAG"
          else
            if [ -n "$REQUESTED_TAG" ]; then
              echo "Requested tag '$REQUESTED_TAG' not found in openclaw/openclaw. Falling back to default branch."
            fi
            git clone --depth 1 "$REPO_URL" openclaw-source
            OPENCLAW_VERSION="$(git -C openclaw-source rev-parse --short HEAD)"
          fi

          cd openclaw-source/apps/android
          ./gradlew clean assembleDebug
          APK="openclaw-android-$OPENCLAW_VERSION.apk"
          APK_SOURCE="$(find app/build/outputs/apk -type f -name '*debug*.apk' | head -n 1)"
          if [ -z "$APK_SOURCE" ]; then
            echo "No debug APK found under app/build/outputs/apk"
            find app/build/outputs/apk -type f -name '*.apk' || true
            exit 1
          fi
          mv "$APK_SOURCE" "$APK"
          echo "OPENCLAW_VERSION=$OPENCLAW_VERSION" >> $GITHUB_ENV
          echo "APK_PATH=$PWD/$APK" >> $GITHUB_ENV

      - name: Create/Release APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          tag_name: openclaw-android-${{ env.OPENCLAW_VERSION }}
          name: OpenClaw Android APK ${{ env.OPENCLAW_VERSION }}
          body: Built from OpenClaw ${{ env.OPENCLAW_VERSION }}
          draft: false
          prerelease: false
