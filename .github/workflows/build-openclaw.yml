name: Build OpenClaw Docker Images and APK

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-openclaw.yml'
      - 'openclaw/**'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/build-openclaw.yml'
      - 'openclaw/**'
  workflow_dispatch:
    inputs:
      openclaw_tag:
        description: 'OpenClaw tag to build'
        required: true
        default: &openclaw_tag 'v2026.6.5'
      apt_packages:
        description: 'Extra apt packages to install (space-separated)'
        required: false
        default: ''

env:
  IMAGE_NAME: antiantiops/openclaw
  OPENCLAW_TAG: *openclaw_tag
  BUILDKIT_PROGRESS: plain

jobs:
  # ── Resolve OpenClaw version once ────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      openclaw_version: ${{ steps.version.outputs.openclaw_version }}
    steps:
      - name: Resolve OpenClaw version
        id: version
        run: |
          REQUESTED_TAG="${{ inputs.openclaw_tag || env.OPENCLAW_TAG }}"
          REPO_URL="https://github.com/openclaw/openclaw.git"

          if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
            echo "openclaw_version=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
          else
            if [ -n "$REQUESTED_TAG" ]; then
              echo "Requested tag '$REQUESTED_TAG' not found in openclaw/openclaw. Falling back to default branch."
            fi
            TEMP_DIR="$(mktemp -d)"
            git clone --depth 1 "$REPO_URL" "$TEMP_DIR"
            SHORT_SHA="$(git -C "$TEMP_DIR" rev-parse --short HEAD)"
            rm -rf "$TEMP_DIR"
            echo "openclaw_version=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

  # ── Base image: build natively per arch, then merge manifests ───
  base_build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Clone OpenClaw source repository
        run: |
          REQUESTED_TAG="${{ inputs.openclaw_tag || env.OPENCLAW_TAG }}"
          REPO_URL="https://github.com/openclaw/openclaw.git"

          if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_TAG" "$REPO_URL" openclaw-source
          else
            git clone --depth 1 "$REPO_URL" openclaw-source
          fi

      - name: Copy Dockerfiles to OpenClaw source
        run: |
          cp openclaw/Dockerfile openclaw-source/
          cp openclaw/.dockerignore openclaw-source/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./openclaw-source
          file: ./openclaw-source/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=${{ github.event.inputs.apt_packages || '' }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=openclaw-${{ matrix.runner }}
          cache-to: type=gha,mode=min,scope=openclaw-${{ matrix.runner }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: base-digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  base_merge:
    needs: [prepare, base_build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: base-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.openclaw_version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Output image details
        run: |
          echo "✅ Base multi-arch image built successfully!"
          echo "🏗️ Platforms: linux/amd64, linux/arm64"
          echo "📦 Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "🔖 OpenClaw version: ${{ needs.prepare.outputs.openclaw_version }}"

  # ── DevOps image: single-arch amd64, simple build+push ──────────
  devops_build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Clone OpenClaw source repository
        run: |
          REQUESTED_TAG="${{ inputs.openclaw_tag || env.OPENCLAW_TAG }}"
          REPO_URL="https://github.com/openclaw/openclaw.git"

          if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_TAG" "$REPO_URL" openclaw-source
          else
            git clone --depth 1 "$REPO_URL" openclaw-source
          fi

      - name: Copy Dockerfiles to OpenClaw source
        run: |
          cp openclaw/Dockerfile_DevOps openclaw-source/
          cp openclaw/.dockerignore openclaw-source/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.openclaw_version }}-devops-tool
            type=raw,value=latest-devops-tool

      - name: Build and push DevOps Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./openclaw-source
          file: ./openclaw-source/Dockerfile_DevOps
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=${{ github.event.inputs.apt_packages || '' }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=openclaw-devops
          cache-to: type=gha,mode=min,scope=openclaw-devops

      - name: Output image details
        run: |
          echo "✅ DevOps image built successfully!"
          echo "🏗️ Platforms: linux/amd64"
          echo "📦 Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "🔖 OpenClaw version: ${{ needs.prepare.outputs.openclaw_version }}"


  apk_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Setup Android
        uses: android-actions/setup-android@v4

      - name: Build APK
        run: |
          REQUESTED_TAG="${{ inputs.openclaw_tag || env.OPENCLAW_TAG }}"
          REPO_URL="https://github.com/openclaw/openclaw.git"

          if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_TAG" "$REPO_URL" openclaw-source
            OPENCLAW_VERSION="$REQUESTED_TAG"
          else
            if [ -n "$REQUESTED_TAG" ]; then
              echo "Requested tag '$REQUESTED_TAG' not found in openclaw/openclaw. Falling back to default branch."
            fi
            git clone --depth 1 "$REPO_URL" openclaw-source
            OPENCLAW_VERSION="$(git -C openclaw-source rev-parse --short HEAD)"
          fi

          cd openclaw-source/apps/android
          ./gradlew clean assembleDebug
          APK="openclaw-android-$OPENCLAW_VERSION.apk"
          APK_SOURCE="$(find app/build/outputs/apk -type f -name '*debug*.apk' | head -n 1)"
          if [ -z "$APK_SOURCE" ]; then
            echo "No debug APK found under app/build/outputs/apk"
            find app/build/outputs/apk -type f -name '*.apk' || true
            exit 1
          fi
          mv "$APK_SOURCE" "$APK"
          echo "OPENCLAW_VERSION=$OPENCLAW_VERSION" >> $GITHUB_ENV
          echo "APK_PATH=$PWD/$APK" >> $GITHUB_ENV

      - name: Create/Release APK
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.APK_PATH }}
          tag_name: openclaw-android-${{ env.OPENCLAW_VERSION }}
          name: OpenClaw Android APK ${{ env.OPENCLAW_VERSION }}
          body: Built from OpenClaw ${{ env.OPENCLAW_VERSION }}
          draft: false
          prerelease: false
