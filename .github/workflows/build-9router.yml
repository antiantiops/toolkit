name: Build and Push 9router Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      router_version:
        description: "9router version (leave empty for default)"
        required: false
        type: string
      openclaw_version:
        description: "openclaw version (leave empty for default)"
        required: false
        type: string
  # schedule:
  #   - cron: "17 2 * * *"

env:
  IMAGE_NAME: antiantiops/9router
  DEFAULT_ROUTER_VERSION: "0.3.69"     # <--- EDIT DEFAULT 9ROUTER VERSION HERE https://www.npmjs.com/package/9router
  DEFAULT_OPENCLAW_VERSION: "latest"   # <--- EDIT DEFAULT OPENCLAW VERSION HERE

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Determine 9router version
        id: router_version
        run: |
          TARGET_VERSION="${{ inputs.router_version || env.DEFAULT_ROUTER_VERSION }}"
          if [ "$TARGET_VERSION" = "latest" ]; then
            VERSION=$(npm show 9router version)
          else
            VERSION="$TARGET_VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Extract Docker metadata 
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.version }}-{{sha}}
            type=raw,value=${{ env.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./9router
          file: ./9router/Dockerfile_AntiAntiOps
          build-args: |
            ROUTER_VERSION=${{ env.version }}
            OPENCLAW_VERSION=${{ inputs.openclaw_version || env.DEFAULT_OPENCLAW_VERSION }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=9router
          cache-to: type=gha,mode=max,scope=9router
