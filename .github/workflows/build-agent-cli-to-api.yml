name: Build agent-cli-to-api Docker image

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Branch or tag from leeguooooo/agent-cli-to-api"
        required: false
        default: "main"
      image_name:
        description: "Docker Hub image name"
        required: false
        default: "antiantiops/agent-cli-to-api"

env:
  DEFAULT_UPSTREAM_REF: main
  DEFAULT_IMAGE_NAME: antiantiops/agent-cli-to-api
  DEVOPS_TAG_SUFFIX: -devops

jobs:
  docker_build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout toolkit repository
        uses: actions/checkout@v6

      - name: Clone upstream source repository
        run: |
          set -eu
          REPO_URL="https://github.com/leeguooooo/agent-cli-to-api.git"
          REQUESTED_REF="${{ inputs.upstream_ref || env.DEFAULT_UPSTREAM_REF }}"

          if git ls-remote --exit-code --heads "$REPO_URL" "refs/heads/$REQUESTED_REF" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_REF" "$REPO_URL" agent-cli-to-api-source
            AGENT_VERSION="$(git -C agent-cli-to-api-source rev-parse --short HEAD)"
          elif git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_REF" >/dev/null 2>&1; then
            git clone --depth 1 --branch "$REQUESTED_REF" "$REPO_URL" agent-cli-to-api-source
            AGENT_VERSION="$REQUESTED_REF"
          else
            echo "Requested ref '$REQUESTED_REF' not found. Falling back to default branch."
            git clone --depth 1 "$REPO_URL" agent-cli-to-api-source
            AGENT_VERSION="$(git -C agent-cli-to-api-source rev-parse --short HEAD)"
          fi

          echo "AGENT_VERSION=$AGENT_VERSION" >> "$GITHUB_ENV"

      - name: Copy Dockerfiles to upstream source
        run: |
          cp agent-cli-to-api/Dockerfile agent-cli-to-api-source/Dockerfile
          cp agent-cli-to-api/Dockerfile_DevOps agent-cli-to-api-source/Dockerfile_DevOps

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image_name || env.DEFAULT_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.AGENT_VERSION }}
            type=raw,value=latest

      - name: Extract metadata for Docker DevOps image
        id: meta_devops
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image_name || env.DEFAULT_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.AGENT_VERSION }}${{ env.DEVOPS_TAG_SUFFIX }}
            type=raw,value=latest${{ env.DEVOPS_TAG_SUFFIX }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./agent-cli-to-api-source
          file: ./agent-cli-to-api-source/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent-cli-to-api
          cache-to: type=gha,mode=max,scope=agent-cli-to-api

      - name: Build and push Docker DevOps image
        uses: docker/build-push-action@v7
        with:
          context: ./agent-cli-to-api-source
          file: ./agent-cli-to-api-source/Dockerfile_DevOps
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_devops.outputs.tags }}
          labels: ${{ steps.meta_devops.outputs.labels }}
          cache-from: type=gha,scope=agent-cli-to-api-devops
          cache-to: type=gha,mode=max,scope=agent-cli-to-api-devops

      - name: Output image details
        run: |
          echo "Image built successfully"
          echo "Base image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "DevOps image tags:"
          echo "${{ steps.meta_devops.outputs.tags }}"
          echo "Upstream version: ${{ env.AGENT_VERSION }}"
