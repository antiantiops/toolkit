name: Build & Release OpenClaw APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      openclaw_tag:
        description: 'OpenClaw tag'
        required: true
        default: 'v2026.3.13'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: write }

    steps:
    - uses: actions/checkout@v4

    - name: Setup Android
      uses: android-actions/setup-android@v3

    - name: Build APK
      run: |
        REQUESTED_TAG="${{ inputs.openclaw_tag }}"
        REPO_URL="https://github.com/openclaw/openclaw.git"

        if [ -n "$REQUESTED_TAG" ] && git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/$REQUESTED_TAG" >/dev/null 2>&1; then
          git clone --depth 1 --branch "$REQUESTED_TAG" "$REPO_URL" openclaw-source
          BUILD_REF="$REQUESTED_TAG"
        else
          if [ -n "$REQUESTED_TAG" ]; then
            echo "Requested tag '$REQUESTED_TAG' not found in openclaw/openclaw. Falling back to default branch."
          fi
          git clone --depth 1 "$REPO_URL" openclaw-source
          BUILD_REF="$(git -C openclaw-source rev-parse --short HEAD)"
        fi

        cd openclaw-source/apps/android
        ./gradlew clean assembleDebug
        APK="openclaw-android-$BUILD_REF.apk"
        mv app/build/outputs/apk/debug/app-debug.apk "$APK"
        echo "APK_PATH=$PWD/$APK" >> $GITHUB_ENV
        echo "BUILD_REF=$BUILD_REF" >> $GITHUB_ENV

    - name: Create/Release APK
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.APK_PATH }}
        tag_name: openclaw-android-${{ env.BUILD_REF }}
        name: OpenClaw Android APK ${{ env.BUILD_REF }}
        body: Built from OpenClaw ${{ env.BUILD_REF }}
        draft: false
        prerelease: false
